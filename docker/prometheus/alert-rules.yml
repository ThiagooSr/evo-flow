# Service-specific alerts for the evo-flow distributed pipeline
# (story 5.3 / EVO-1224, thresholds from Architecture §Decision Impact).
#
# Every alert targets ONE mode of the pipeline so the on-call lands directly
# on the failing part instead of a generic "evo-flow saturated" page. The
# `service` label mirrors RUN_MODE, matching the structured-log field (5.2),
# so the runbook's log filters and these alerts speak the same language.
#
# Metric inventory these rules consume (all already emitted — nothing new):
# - evo_flow_consumer_lag{mode,topic}          gauge, backlog in MESSAGES (4.3)
# - evo_flow_errors_total{mode,category}        counter (5.2 + per-mode stories)
# - evo_flow_throughput_total{mode}             counter, processed units (5.2)
# - idempotency_hits_total / idempotency_misses_total  counters (2.4 / EVO-1204)
# Mode-label note: metrics carry mode = RUN_MODE verbatim. Under RUN_MODE=single
# (local dev / small deployments) every signal is labeled mode="single", so the
# per-service rules match mode=~"<mode>|single" — service specificity is kept by
# the error categories, which are exclusive to each service (dispatch_5xx only
# exists in the sender; unhandled/intake_failure only in the receiver). Caveat:
# in single mode evo_flow_throughput_total is shared by all modes, so the ratio
# denominators are approximate there; exact under the per-mode topology.
groups:
  - name: evo-flow-pipeline
    rules:
      # Scrape-level guard: a dead process stops emitting series entirely, so
      # value-based alerts (e.g. the lag rule below) go silent exactly when the
      # process died. `up` is generated by Prometheus itself and survives that.
      - alert: EvoFlowTargetDown
        expr: up{job="evo-flow"} == 0
        for: 2m
        labels:
          severity: page
          service: evo-flow
        annotations:
          summary: 'evo-flow /metrics target is down ({{ $labels.instance }})'
          description: >-
            Prometheus cannot scrape the evo-flow process. Every other alert in
            this file is blind while this fires — treat it as the highest
            priority signal.
          runbook: docs/runbooks/campaign-sender-lag.md
          dashboard: http://localhost:9090/targets
      # The story's AC reads "lag > 5min". The emitted lag gauge measures
      # MESSAGES, not time (no time-based lag metric exists), so the agreed
      # mapping is "backlog never drains for 5 sustained minutes": any lag
      # observed continuously for 5m means the sender is late or stalled.
      - alert: CampaignSenderLagNotDraining
        expr: evo_flow_consumer_lag{topic="campaigns.send"} > 0
        for: 5m
        labels:
          severity: page
          service: campaign-sender
        annotations:
          summary: 'campaigns.send backlog is not draining ({{ $value }} messages for 5m+)'
          description: >-
            The campaign-sender has had a non-zero backlog on campaigns.send
            for 5 sustained minutes — dispatch is late or stalled. Check the
            runbook before touching the broker.
          runbook: docs/runbooks/campaign-sender-lag.md
          dashboard: http://localhost:9090/graph?g0.expr=evo_flow_consumer_lag%7Btopic%3D%22campaigns.send%22%7D

      # Ratio of 5xx dispatches over ALL dispatch outcomes (success throughput
      # + every dispatch_* error). NaN on zero traffic never fires (PromQL
      # comparisons on NaN are false). Provider granularity: errors_total has
      # no provider label (adding metrics is out of this story's scope) — the
      # alert identifies the dispatch path (mode=campaign-sender via the CRM
      # inbox API); the runbook narrows down the concrete provider.
      - alert: ProviderDispatch5xxRateHigh
        expr: |
          sum(rate(evo_flow_errors_total{mode=~"campaign-sender|single",category="dispatch_5xx"}[5m]))
            /
          (
            sum(rate(evo_flow_throughput_total{mode=~"campaign-sender|single"}[5m]))
              +
            sum(rate(evo_flow_errors_total{mode=~"campaign-sender|single",category=~"dispatch_.+"}[5m]))
          )
          > 0.10
        for: 2m
        labels:
          severity: page
          service: campaign-sender
        annotations:
          summary: 'Provider dispatch 5xx rate above 10% over 5m ({{ $value | humanizePercentage }})'
          description: >-
            More than 10% of campaign dispatches through the CRM inbox API are
            failing with provider 5xx. The provider behind the affected
            inboxes (Evolution API / email provider) is degraded — the runbook
            shows how to identify which one from the sender logs.
          runbook: docs/runbooks/provider-5xx-rate.md
          dashboard: http://localhost:9090/graph?g0.expr=rate(evo_flow_errors_total%7Bmode%3D%22campaign-sender%22%7D%5B5m%5D)

      # Share of webhook events dropped as duplicates by the idempotency guard.
      # The traffic floor (> 0.01 ev/s ≈ 3 events / 5m) guards the 0/0 case and
      # keeps an idle pipeline from paging on a single stray duplicate.
      - alert: EventProcessIdempotencyDropRateHigh
        expr: |
          (
            sum(rate(idempotency_hits_total[5m]))
              /
            (sum(rate(idempotency_hits_total[5m])) + sum(rate(idempotency_misses_total[5m])))
            > 0.5
          )
          and
          (
            sum(rate(idempotency_hits_total[5m])) + sum(rate(idempotency_misses_total[5m]))
            > 0.01
          )
        for: 2m
        labels:
          severity: page
          service: event-process
        annotations:
          summary: 'Idempotency drop rate above 50% over 5m — possible replay attack or misconfig'
          description: >-
            More than half of the incoming webhook events are being dropped as
            duplicates. Possible replay attack or misconfig: a provider
            re-delivering in a loop, two receivers pointed at the same broker
            topic, or a replay script without idempotency-key awareness.
          runbook: docs/runbooks/idempotency-drop-rate.md
          dashboard: http://localhost:9090/graph?g0.expr=rate(idempotency_hits_total%5B5m%5D)

      # 5xx responses from the webhook receiver: category 'intake_failure'
      # (503, broker publish failed) and 'unhandled' (500). 'malformed_payload'
      # is a 400 and deliberately excluded. Denominator: throughput_total is
      # incremented in the controller's finally block, i.e. once per request.
      - alert: EventReceiver5xxRateHigh
        expr: |
          sum(rate(evo_flow_errors_total{mode=~"event-receiver|single",category=~"unhandled|intake_failure"}[5m]))
            /
          sum(rate(evo_flow_throughput_total{mode=~"event-receiver|single"}[5m]))
          > 0.01
        for: 2m
        labels:
          severity: page
          service: event-receiver
        annotations:
          summary: 'Webhook receiver 5xx rate above 1% over 5m ({{ $value | humanizePercentage }})'
          description: >-
            The event-receiver is failing more than 1% of provider webhooks
            with 5xx — providers will back off and may drop deliveries.
            Logs filter: service="event-receiver" (structured-log field equals
            RUN_MODE).
          runbook: docs/runbooks/event-receiver-5xx-rate.md
          dashboard: http://localhost:9090/graph?g0.expr=rate(evo_flow_errors_total%7Bmode%3D%22event-receiver%22%7D%5B5m%5D)
