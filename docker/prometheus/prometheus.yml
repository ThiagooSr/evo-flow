# Prometheus config for the evo-flow distributed pipeline (story 5.3 / EVO-1224).
#
# Local topology: scrape the app on the host. Under RUN_MODE=single every
# pipeline mode runs in one process, so all signals (consumer lag, error
# categories, idempotency counters, request durations) appear on a single
# GET /metrics at PORT (default 3334). Worker modes do not expose their own
# HTTP server yet — per-mode /metrics exposure is story 5.1 (EVO-1226); when it
# lands, add one static_config target per mode below.
global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - /etc/prometheus/alert-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: ['alertmanager:9093']

scrape_configs:
  - job_name: evo-flow
    static_configs:
      - targets: ['host.docker.internal:3334']
